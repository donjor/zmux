# ══════════════════════════════════════════════════════════
# zmux — opinionated tmux config
# https://github.com/donjor/zmux
# ══════════════════════════════════════════════════════════
# Theme is applied via: run-shell "<zmux-root>/bin/zmux-apply-theme"
# Set up with: zmux init

# ───────────────────────────────────────────
# General
# ───────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",tmux-256color:Tc"
set -g extended-keys on
set -ga terminal-features ",xterm-256color:extkeys"
set -g mouse on
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename on
setw -g automatic-rename-format "#{?pane_in_mode,[tmux],#{pane_current_command}}"
setw -g remain-on-exit failed
setw -g remain-on-exit-format "Pane stopped unexpectedly#{?#{!=:#{pane_dead_status},}, (status #{pane_dead_status}),}#{?#{!=:#{pane_dead_signal},}, (signal #{pane_dead_signal}),} — press prefix+x to close the tab"
set -g set-clipboard on
set -g status-position top
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 100

# ───────────────────────────────────────────
# Prefix — Ctrl+Space
# ───────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ───────────────────────────────────────────
# Vim copy mode
# ───────────────────────────────────────────
setw -g mode-keys vi

bind v copy-mode
bind R respawn-pane -k
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi / command-prompt -p "search down:" "send -X search-forward '%%'"
bind -T copy-mode-vi ? command-prompt -p "search up:" "send -X search-backward '%%'"

# Clipboard bindings are set dynamically by zmux-apply-theme
# based on detected clipboard tool (wl-copy, xclip, pbcopy)

# ───────────────────────────────────────────
# Windows (tabs)
# ───────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind . command-prompt -p "rename tab:" "rename-window '%%'"

# Alt+1-5 to switch tabs (no prefix needed)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ───────────────────────────────────────────
# Sessions
# ───────────────────────────────────────────
bind , command-prompt -p "rename session:" "rename-session '%%'"
bind s choose-tree -s
bind x confirm-before -p "kill session #S? (y/n)" "run-shell 'tmux kill-session -t \"#S\"'"

# ───────────────────────────────────────────
# Status refresh hooks
# ───────────────────────────────────────────
set-hook -gu window-unlinked[0]
set-hook -gu window-linked[1]
set-hook -gu window-unlinked[1]
set-hook -gu window-renamed[1]
set-hook -g window-linked[1] "run-shell -b 'zmux tab refresh-names #{session_name} >/dev/null 2>&1 || true'"
set-hook -g window-unlinked[1] "run-shell -b 'zmux tab refresh-names #{session_name} >/dev/null 2>&1 || true'"
set-hook -g window-renamed[1] "run-shell -b 'zmux tab refresh-names #{session_name} >/dev/null 2>&1 || true'"

# ───────────────────────────────────────────
# Pasting
# ───────────────────────────────────────────
bind p paste-buffer

# ───────────────────────────────────────────
# Misc
# ───────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"
