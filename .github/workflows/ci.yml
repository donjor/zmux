name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      # `golangci-lint run` also checks formatters (gofumpt) configured in
      # .golangci.yml, so it supersedes the old bespoke `gofmt -l` step.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      # Kept explicit (golangci also runs govet) as a guard against linter
      # config drift accidentally disabling vet.
      - name: go vet
        run: go vet ./...

      # Build the binary first: the integration tests exec ./zmux
      # (see tests/integration_test.go) and fail if it's missing.
      - name: build
        run: make build

      # Race detector on the full unit suite — zmux runs bubbletea goroutines,
      # so -race is the meaningful gate (also compiles every package).
      - name: go test (race)
        run: go test -race ./...

      # Integration tests are build-tagged and exercise the built binary's CLI.
      - name: integration tests
        run: go test -tags integration ./tests/...

  vuln:
    name: vuln
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # govulncheck (latest) needs Go >= 1.25; pin the scanner's toolchain here
      # independently of the project's 1.24 build/test pin so the vuln signal
      # stays current.
      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.25'
          go-package: ./...
