name = "worktree-shell"
description = "Create one worktree shell session per item"
kind = "workspace"
workspace = "{{ cwd_name | slug }}"

[inputs]
items = true
min_items = 1
prompt = "Worktree names"

[[sessions]]
foreach = "items"
name = "{{ item | slug }}"

[[sessions.tabs]]
name = "shell"
command = "wt switch --create {{ item | shellquote }} -x \"$SHELL\""
