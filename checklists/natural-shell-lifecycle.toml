# QA walkthrough for plan 046: natural shell lifecycle glyphs.
#
# Targets the isolated zzmux edge profile — live zmux is untouched.
# Setup: `./dev.sh zzmux && zzmux apply`, then create the QA session with:
# `tmux -L zzmux new-session -d -s qa-shell -n seed bash`.
# Drive from here: `./qa natural-shell-lifecycle` (picker) or `./qa run natural-shell-lifecycle`.

[checklist]
name = "Natural shell lifecycle (046 + lifecycle-state v2)"
doc = "Normal commands typed into a fresh zzmux-managed shell should publish running → done/failed glyph and command metadata without zmux-run sentinels, while persistent venues stay idle until explicit turn signals. Keep a 'zzmux new qa-shell' terminal visible for the glyph expectations."

[checklist.vars]
bin = "zzmux"
s = "qa-shell"
tab = "natural"

[[step]]
id = "session"
name = "qa-shell session exists"
cmd = "{bin} ls"
expect = "session 'qa-shell' is listed (setup: tmux -L zzmux new-session -d -s qa-shell -n seed bash)"
check = "(?m)\\bqa-shell\\b"

[[step]]
id = "raw-tab"
name = "Create a fresh shell tab without zmux run"
cmd = "tmux -L zzmux new-window -d -t {s} -n {tab}; tmux -L zzmux list-windows -t {s} -F '#{{window_name}}'"
expect = "a fresh tab named 'natural' appears in the visible qa-shell session"
check = "(?m)^natural$"
needs = ["session"]

[[step]]
id = "bash-norc-survives"
name = "Nested bash --norc survives the managed shell"
cmd = "pane=$(tmux -L zzmux list-panes -t {s}:{tab} -F '#{{pane_id}}' | head -1); tmux -L zzmux send-keys -t \"$pane\" 'bash --norc -ic \"echo bash-norc-ok; exit\"' Enter; sleep 1; out=$({bin} watch {tab} -s {s} -l 30); printf '%s\n' \"$out\"; if printf '%s\n' \"$out\" | grep -q '\\[ble: exit 1\\]'; then exit 1; fi; echo no-ble-error"
expect = "bash --norc launches as a foreground child, prints bash-norc-ok, exits, and no [ble: exit 1] appears"
check = "(?s)bash-norc-ok.*no-ble-error"
needs = ["raw-tab"]

[[step]]
id = "foreground-child-survives"
name = "Foreground terminal child exits cleanly"
cmd = "pane=$(tmux -L zzmux list-panes -t {s}:{tab} -F '#{{pane_id}}' | head -1); tmux -L zzmux send-keys -t \"$pane\" 'python3 -c \"import sys, termios; termios.tcgetattr(sys.stdin.fileno()); print(\\\"ttyok\\\")\"' Enter; sleep 1; out=$({bin} watch {tab} -s {s} -l 40); printf '%s\n' \"$out\"; if printf '%s\n' \"$out\" | grep -q '\\[ble: exit 1\\]'; then exit 1; fi; echo no-ble-error"
expect = "a foreground TTY-using child reads terminal state, exits cleanly, and does not print [ble: exit 1]"
check = "(?s)ttyok.*no-ble-error"
needs = ["bash-norc-survives"]

[[step]]
id = "agent-cli-interactive-launch"
name = "Interactive Claude launch does not immediately fail under ble"
cmd = "if ! command -v claude >/dev/null 2>&1; then echo claude-interactive-skipped; exit 0; fi; tmux -L zzmux new-window -d -t {s} -n claude-smoke bash; sleep 1; pane=$(tmux -L zzmux list-panes -t {s}:claude-smoke -F '#{{pane_id}}' | head -1); tmux -L zzmux send-keys -t \"$pane\" 'claude' Enter; sleep 3; out=$(tmux -L zzmux capture-pane -t \"$pane\" -p -S -80); printf '%s\n' \"$out\"; tmux -L zzmux send-keys -t \"$pane\" C-c; sleep 1; tmux -L zzmux kill-window -t {s}:claude-smoke 2>/dev/null || true; if printf '%s\n' \"$out\" | grep -q '\\[ble: exit 1\\]'; then exit 1; fi; echo claude-interactive-ok"
expect = "if Claude is installed, a typed interactive `claude` command shows the Claude Code UI instead of immediately returning `[ble: exit 1]`; otherwise the step prints an explicit skip"
check = "(?s)(Claude Code|claude-interactive-skipped).*claude-interactive-ok|claude-interactive-skipped"
needs = ["foreground-child-survives"]

[[step]]
id = "manual-running"
name = "Raw typed command sets running"
cmd = "pane=$(tmux -L zzmux list-panes -t {s}:{tab} -F '#{{pane_id}}' | head -1); tmux -L zzmux send-keys -t \"$pane\" 'sleep 3; printf \"natural-%s\\n\" ok' Enter; sleep 1; printf 'state='; tmux -L zzmux show-options -p -t \"$pane\" -v @zmux_state; printf 'cmd='; tmux -L zzmux show-options -p -t \"$pane\" -v @zmux_cmd_state"
expect = "the visible tab shows a running spinner while the command sleeps; printed state/cmd are running"
check = "state=running[[:space:]]+cmd=running"
needs = ["raw-tab"]

[[step]]
id = "manual-done"
name = "Raw typed command sets done and last exit"
cmd = "sleep 4; pane=$(tmux -L zzmux list-panes -t {s}:{tab} -F '#{{pane_id}}' | head -1); {bin} watch {tab} -s {s} -l 20; {bin} tab status {tab} -s {s} --json"
expect = "output includes a real natural-ok output line (not only the echoed command), status JSON reports state=done, cmdState=done, lastExit=0, and the visible glyph is ✓"
check = "(?ms)^natural-ok$.*\\\"state\\\": \\\"done\\\".*\\\"cmdState\\\": \\\"done\\\".*\\\"lastExit\\\": \\\"0\\\""
needs = ["manual-running"]

[[step]]
id = "manual-failed"
name = "Raw typed failure sets failed and last exit"
cmd = "pane=$(tmux -L zzmux list-panes -t {s}:{tab} -F '#{{pane_id}}' | head -1); tmux -L zzmux send-keys -t \"$pane\" \"sh -c 'exit 3'\" Enter; sleep 1; {bin} tab status {tab} -s {s} --json"
expect = "status JSON reports state=failed, cmdState=failed, lastExit=3, and the visible glyph is ✗"
check = "(?s)\\\"state\\\": \\\"failed\\\".*\\\"cmdState\\\": \\\"failed\\\".*\\\"lastExit\\\": \\\"3\\\""
needs = ["manual-done"]

[[step]]
id = "venue-no-spinner"
name = "Persistent venue launch does not stick on running"
cmd = "pane=$(tmux -L zzmux list-panes -t {s}:{tab} -F '#{{pane_id}}' | head -1); tmux -L zzmux send-keys -t \"$pane\" 'less /dev/null' Enter; sleep 1; printf 'state='; tmux -L zzmux show-options -p -t \"$pane\" -v @zmux_state 2>/dev/null || true; tmux -L zzmux send-keys -t \"$pane\" q"
expect = "the visible tab does not show a running spinner for the long-lived less venue; state output is blank/unset"
check = "state=[[:space:]]*$"
needs = ["manual-failed"]

[[step]]
id = "run-no-sentinel"
name = "zmux run uses the same lifecycle channel"
cmd = "{bin} run 'echo run-ok' -n run-natural -s {s} -T 15"
expect = "prints run-ok, returns success, and no :::AGENT_DONE marker appears"
check = "run-ok"
needs = ["session"]

[[step]]
id = "agent-cli-smoke"
name = "Agent CLI non-interactive smoke does not wedge"
cmd = "{bin} run \"bash -lc \\\"(command -v claude >/dev/null && claude --version) || (command -v pi >/dev/null && pi --version) || echo agent-cli-smoke-skipped\\\"\" -n agent-cli-smoke -s {s} -T 20"
expect = "prints a Claude/Pi version or an explicit skip marker; the run exits through lifecycle metadata without sentinel text"
check = "(?s)(claude|pi|agent-cli-smoke-skipped)"
needs = ["session"]

[[step]]
id = "failure-status"
name = "Failure records failed state and exit code"
cmd = "set +e; {bin} run \"sh -c 'exit 7'\" -n run-fail -s {s} -T 15 >/tmp/zmux-qa-run-fail.out 2>&1; rc=$?; cat /tmp/zmux-qa-run-fail.out; {bin} tab status run-fail -s {s} --json; exit 0"
expect = "run reports command exited with code 7; status JSON reports failed/cmdState failed/lastExit 7"
check = "(?s)command exited with code 7.*\\\"cmdState\\\": \\\"failed\\\".*\\\"lastExit\\\": \\\"7\\\""
needs = ["session"]

[[step]]
id = "cleanup"
name = "Kill the qa-shell session"
cmd = "{bin} workspace kill {s}; if {bin} ls -s | grep -q '\\bqa-shell\\b'; then exit 1; fi; echo qa-shell-gone"
expect = "the watching terminal detaches; session gone"
check = "qa-shell-gone"
needs = ["session"]
